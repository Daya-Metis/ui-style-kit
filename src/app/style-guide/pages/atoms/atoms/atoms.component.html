<div class="page-layout">
  <aside class="toc-panel">
    <div class="toc-sticky">
        <app-content-table
          [sections]="[
            { id: 'button-section', label: 'Buttons' },
            { id: 'try-buttons', label: 'Try Buttons!' },
            { id: 'input-section', label: 'Input' },
            { id: 'arrow-section', label: 'Arrows' },
            { id: 'icon-section', label: 'Icons' },
            { id: 'checks-section', label: 'Checkbox & Radio' },
            { id: 'search-section', label: 'Searchbar' },
            { id: 'switch-section', label: 'Switch' },
            { id: 'tooltip-section', label: 'Tooltip' },
          ]"
        />
    </div>
  </aside>

  <main class="main-content">

    <h1>Atoms</h1>

    <section id="button-section">
      <h2>Button</h2>
      <app-button label="Primary" type="primary"></app-button>
      <app-button label="Secondary" type="secondary"></app-button>
      <app-button icon="🗑" variant="icon"></app-button>
      <app-button icon="✅" label="With Icon" variant="icon-label" type="primary"></app-button>

      <app-button
      icon="🦦"
      label="Continue"
      variant="grow"
      growDirection="right"
    ></app-button>

    </section>

    <section id="try-buttons">
      <app-playground
        title="Button"
        [code]="buttonMarkup"
      >
        <div preview>
          <div
            class="confetti"
            [class.show-confetti]="confettiActive"
          >
            <app-button
              [type]="type"
              [variant]="variant"
              [label]="label"
              [icon]="icon"
              [growDirection]="growDirection"
              (click)="triggerConfetti()"
              onkeypress="triggerConfetti()"
            ></app-button>
          </div>
        </div>

        <div controls>
          <div class="control">
            <app-input
              label="Label"
              [(ngModel)]="label"
              *ngIf="variant !== 'icon'"
            ></app-input>
          </div>

          <div class="control">
            <app-input
              label="Icon"
              [(ngModel)]="icon"
              *ngIf="variant !== 'default'"
            ></app-input>
          </div>

          <div class="control">
              <app-select
                label="Choose a variant"
                [mode]="'radio'"
                [options]="['default', 'icon', 'icon-label', 'grow']"
                [(model)]="variant"
              ></app-select>
          </div>

          <div class="control" 
          *ngIf="variant === 'grow'">
            <app-switch
              label="Grow to Left"
              [(checked)]="toLeft"
              (checkedChange)="updateDirectionFromToggle($event)"
            ></app-switch>
          </div>

          <div class="control">
            <app-switch
              label="Primary Button"
              [(checked)]="isPrimary"
              (checkedChange)="updateTypeFromToggle($event)"
            ></app-switch>
          </div>

          <div class="control">
            <app-input
            label="{{ type | titlecase }} Color"
            type="color"
            [(ngModel)]="colors[type]"
            (ngModelChange)="themeService.setColor(type, $event)"
            ></app-input>
          </div>
        </div>
      </app-playground>
    </section>

    <section id="input-section">
      <h2>Input</h2>
      <div>
        <app-input label="Name" placeholder="Your name"></app-input>
      </div>
      <div>
        <app-input label="Mail" type="email"></app-input>
      </div>
      <div>
        <app-input label="Number" type="number"></app-input>
      </div> 
      <div>
        <app-input
          label="Icon"
          type="icon"
          [(ngModel)]="icon"
        ></app-input>
      </div>
      <div>
        <app-input
          label="Color"
          type="color"
          [(ngModel)]="colors[type]"
          ></app-input>
      </div>
    </section>

    <section class="arrow-section">
      <h2>Arrow</h2>
      <span>Default: 100% right</span><app-arrow></app-arrow>
      <span>200% left</span><app-arrow direction="left" [scale]="2"></app-arrow>
      <span>80% up</span><app-arrow direction="up" [scale]="0.8"></app-arrow>
      <span>150% down</span><app-arrow direction="down" [scale]="1.5"></app-arrow>
    </section>

    <section id="icon-section">
      <h2>Icons & Utility Controls</h2>
      <div class="icon-row">
        <app-icon name="check" tone="success"></app-icon>
        <app-icon name="info" tone="primary"></app-icon>
        <app-icon name="warning" tone="warning"></app-icon>
        <app-icon name="error" tone="error"></app-icon>
      </div>

      <div class="icon-row">
        <app-icon-control variant="close" label="Dismiss"></app-icon-control>
        <app-icon-control variant="info" shape="rounded" label="Info"></app-icon-control>
        <app-icon-control variant="success" label="Confirm"></app-icon-control>
        <app-icon-control variant="error" label="Remove"></app-icon-control>
      </div>

      <app-playground
        title="Icon Control"
        [code]="iconControlMarkup"
      >
        <div preview>
          <app-icon-control
            [variant]="iconControlVariant"
            [shape]="iconControlShape"
            [size]="iconControlSize"
            label="Utility action"
          ></app-icon-control>
        </div>

        <div controls>
          <div class="control">
            <app-select
              label="Variant"
              [options]="['close', 'info', 'warning', 'success', 'error']"
              mode="radio"
              [(model)]="iconControlVariant"
            ></app-select>
          </div>

          <div class="control">
            <app-select
              label="Shape"
              [options]="['circle', 'rounded', 'plain']"
              mode="radio"
              [(model)]="iconControlShape"
            ></app-select>
          </div>

          <div class="control">
            <app-select
              label="Size"
              [options]="['sm', 'md', 'lg', 'xl']"
              mode="radio"
              [(model)]="iconControlSize"
            ></app-select>
          </div>
        </div>
      </app-playground>
    </section>

    <section id="checks-section">
      <h2>Checkbox & Radio</h2>
      <app-checkbox label="Accept Terms" [(checked)]="checkboxState"></app-checkbox>
      <app-checkbox label="Subscribe to Updates" [checked]="true"></app-checkbox>
      <app-radio label="Primary Option" value="primary" [(model)]="radioSelection"></app-radio>
      <app-radio label="Secondary Option" value="secondary" [(model)]="radioSelection"></app-radio>
    </section>

    <section id="search-section">
      <h2>Searchbar</h2>
      <app-input label="Search" placeholder="Type to search..." [(ngModel)]="searchQuery"></app-input>
    </section>

    <section id="switch-section">
      <h2>Switch</h2>
      <app-switch label="Enable Notifications" [(checked)]="switchState"></app-switch>
    </section>

    <section id="tooltip-section">
      <h2>Tooltip</h2>
      <div class="icon-row">
        <app-tooltip text="Muted helper content that explains an action before commit.">
          <app-icon-control variant="info" shape="rounded" label="Information"></app-icon-control>
        </app-tooltip>

        <app-tooltip text="Use tooltips for short supporting context, not primary information." position="bottom">
          <app-button label="Hover me"></app-button>
        </app-tooltip>
      </div>
    </section>
  </main>
</div>
