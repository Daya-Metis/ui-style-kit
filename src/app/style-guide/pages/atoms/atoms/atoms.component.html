<h2>Atoms</h2>

<section>
  <h3>Button</h3>
  <app-button label="Primary" type="primary"></app-button>
  <app-button label="Secondary" type="secondary"></app-button>
  <app-button icon="🗑" variant="icon"></app-button>
  <app-button icon="✅" label="With Icon" variant="icon-label" type="primary"></app-button>

  <app-button
  icon="🦦"
  label="Continue"
  variant="grow"
  growDirection="right"
></app-button>

</section>

<section>
  <app-playground
    title="🎮 Try it Yourself: Button Playground"
    [code]="buttonMarkup"
  >
    <div preview>
      <div
        class="confetti"
        [class.show-confetti]="confettiActive"
      >
        <app-button
          [type]="type"
          [variant]="variant"
          [label]="label"
          [icon]="icon"
          [growDirection]="growDirection"
          (click)="triggerConfetti()"
          onkeypress="triggerConfetti()"
        ></app-button>
      </div>
    </div>

    <div controls>
      <div class="control">
        <app-input
          label="Label"
          [(ngModel)]="label"
          *ngIf="variant !== 'icon'"
        ></app-input>
      </div>

      <div class="control">
        <app-input
          label="Icon"
          [(ngModel)]="icon"
          *ngIf="variant !== 'default'"
        ></app-input>
      </div>

      <div class="control">
          <app-select
            label="Choose a variant"
            [mode]="'radio'"
            [options]="['default', 'icon', 'icon-label', 'grow']"
            [(model)]="variant"
          ></app-select>
      </div>

      <div class="control" 
      *ngIf="variant === 'grow'">
        <app-switch
          label="Direction"
          [(checked)]="toLeft"
          (checkedChange)="updateDirectionFromToggle($event)"
        ></app-switch>
      </div>

      <div class="control">
        <app-switch
          label="Primary"
          [(checked)]="isPrimary"
          (checkedChange)="updateTypeFromToggle($event)"
        ></app-switch>
      </div>

      <div class="control">
        <app-input
        label="{{ type | titlecase }} Color"
        type="color"
        [(ngModel)]="colors[type]"
        (input)="updateColorFromInput($event)"
        ></app-input>
      </div>
    </div>
  </app-playground>
</section>

<section>
  <h3>Input</h3>
  <app-input label="Name" placeholder="Your name"></app-input>
</section>

<section>
  <h3>Arrow</h3>
  <app-arrow></app-arrow> <!-- default: md right -->
  <app-arrow size="lg" direction="left"></app-arrow>
  <app-arrow direction="up"></app-arrow>
</section>

<section>
  <h3>Checkbox & Radio</h3>
  <app-checkbox label="Accept Terms" [(checked)]="checkboxState"></app-checkbox>
  <app-radio label="Primary Option" value="primary" [(model)]="radioSelection"></app-radio>
  <app-radio label="Secondary Option" value="secondary" [(model)]="radioSelection"></app-radio>
</section>

<section>
  <h3>Searchbar</h3>
  <app-input label="Search" placeholder="Type to search..." [(ngModel)]="searchQuery"></app-input>
</section>

<section>
  <h3>Switch</h3>
  <app-switch label="Enable Notifications" [(checked)]="switchState"></app-switch>
</section>

<section>
  <h3>Tooltip</h3>
  <!-- Placeholder, real tooltip needs structure -->
  <app-button label="Hover me" tooltip="I'm a tooltip!"></app-button>
</section>
