<h2>Upload Demo</h2>

<app-file-upload (fileDropped)="handleFile($event)"></app-file-upload>
<h2>With Label</h2>
<app-file-upload
  (fileDropped)="handleFile($event)"
  [label]="'Maximum size: 2MB'"
  [maxSizeMB]="2"
></app-file-upload>

<h2>Multiple Files</h2>
<app-file-upload
  [multiple]="true"
  [maxSizeMB]="5"
  [label]="'Maximum total file size: 5MB'"
  (fileDropped)="handleFile($event)"
></app-file-upload>
