<div class="toc-container">
  <app-button
    [icon]="collapsed ? '☰' : '❌'"
    variant="icon"
    class="toc-toggle"
    (click)="toggle()"
    onkeypress="toggle()"
    aria-label="Toggle table of contents"
  ></app-button>

  <app-card *ngIf="!collapsed" class="toc-card" [contentClass]="'toc-content-style'">
    <h4 class="toc-title">{{ title }}</h4>
    <ul class="toc-list">
      <li
        *ngFor="let section of sections"
        [class.active]="section.id === activeId"
      >
        <a href="#" (click)="scrollTo(section.id, $event)">
          {{ section.label }}
        </a>
      </li>
    </ul>
  </app-card>
</div>
