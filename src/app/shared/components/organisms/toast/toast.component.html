<div class="toast" [ngClass]="variant" role="status" aria-live="polite">
  <div class="toast-accent" aria-hidden="true"></div>

  <div class="toast-content">
    <div class="toast-body">
      <strong class="toast-title">{{ title }}</strong>
      <p class="toast-message">{{ message }}</p>
      <button
        *ngIf="actionLabel"
        type="button"
        class="text-link toast-action"
        (click)="handleAction()"
      >
        {{ actionLabel }}
      </button>
    </div>
  </div>

  <div class="toast-state">
    <app-icon [name]="stateIcon" [tone]="stateTone" size="xl"></app-icon>
  </div>

    <app-icon-control
      *ngIf="dismissible"
      variant="close"
      label="Dismiss toast"
      shape="plain"
      size="sm"
      class="toast-dismiss"
      (pressed)="handleDismiss()"
    ></app-icon-control>
</div>
