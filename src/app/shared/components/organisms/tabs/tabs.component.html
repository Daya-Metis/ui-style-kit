<div class="tabs-wrapper" [ngClass]="orientation">
  <div class="tabs-container"
    [ngClass]="[orientation, size, variant]"
    role="tablist"
  >
    <button
      *ngFor="let tab of tabs; let i = index"
      [class.active]="tab.id === activeTab"
      (click)="selectTab(tab.id)"
      (keydown)="onKeydown($event, i)"
      [attr.aria-selected]="tab.id === activeTab"
      class="tab-btn"
      role="tab"
      [attr.tabindex]="tab.id === activeTab ? 0 : -1"
    >
      <span *ngIf="tab.icon" class="tab-icon">{{ tab.icon }}</span>
      <span class="tab-label">{{ tab.label }}</span>
      <span
        *ngIf="tab.closeable"
        role="button"
        tabindex="0"
        class="tab-close"
        (click)="closeTab(tab.id, $event)"
        (keydown.enter)="closeTab(tab.id, $event)"
        (keydown.space)="closeTab(tab.id, $event)"
      >×</span>
    </button>
  </div>

  <div class="tab-content">
    <ng-content select="[tab-content]"></ng-content>
  </div>
</div>
