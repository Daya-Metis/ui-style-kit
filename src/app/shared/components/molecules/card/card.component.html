<div class="card">
    <img *ngIf="image" [src]="image" alt="" class="card-image" />
  
    <div class="card-content">
      <h4 *ngIf="title">{{ title }}</h4>
      <p *ngIf="text">{{ text }}</p>
    </div>
  
    <a *ngIf="showArrow && link" [href]="link" class="card-arrow-link">
      <app-arrow direction="right"></app-arrow>
    </a>
  </div>
